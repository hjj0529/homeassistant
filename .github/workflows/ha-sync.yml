name: HA Auto Sync (With Hyphen)

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 0 点执行 (北京时间上午 8 点)
  workflow_dispatch:      # 支持手动触发

jobs:
  sync-process:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y skopeo jq

      - name: Sync and Transcode
        run: |
          # 官方源 (带横杠) -> 你的目标 (带横杠)
          OFFICIAL="docker://homeassistant/home-assistant:latest"
          MY_IMAGE_BASE="docker://ghcr.io/${{ github.repository_owner }}/home-assistant"

          # 1. 检查官方镜像指纹
          OFFICIAL_DIGEST=$(skopeo inspect --raw $OFFICIAL | sha256sum | awk '{print $1}')
          
          # 2. 检查你仓库里 latest 的指纹
          MY_DIGEST=$(skopeo inspect --raw ${MY_IMAGE_BASE}:latest 2>/dev/null | sha256sum | awk '{print $1}') || MY_DIGEST=""

          if [ "$OFFICIAL_DIGEST" != "$MY_DIGEST" ]; then
            echo "[*] 检测到官方版本更新，开始转码同步..."

            # 3. 提取版本号 (如 2026.3.2)
            REAL_VERSION=$(skopeo inspect $OFFICIAL | jq -r '.Labels["org.opencontainers.image.version"]')
            
            # 4. 同步 latest 标签 (强制 gzip 兼容 DSM 6.2)
            skopeo copy --dest-compress-format gzip $OFFICIAL ${MY_IMAGE_BASE}:latest
            
            # 5. 同步具体版本号标签
            if [ "$REAL_VERSION" != "null" ]; then
              skopeo copy --dest-compress-format gzip $OFFICIAL ${MY_IMAGE_BASE}:${REAL_VERSION}
              echo "[#] 版本标签 ${REAL_VERSION} 同步成功"
            fi
            echo "[#] Latest 标签同步成功"
          else
            echo "[#] 镜像已是最新，跳过同步。"
          fi
